<html lang="id">

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .container { max-width: 1300px; width: 100%; background: white; padding: 25px 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        h1 { font-size: 26px; color: #1a2b4c; margin-top: 0; border-bottom: 3px solid #2a7de1; padding-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        h1 small { font-size: 15px; font-weight: 400; color: #555; margin-left: auto; }
        .sync-status { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; margin-bottom: 15px; }
        .sync-status.online { background: #e6f7ed; color: #1f8b4c; }
        .sync-status.offline { background: #fde8e8; color: #8f4a4a; }
        .sync-status.syncing { background: #fff8e6; color: #b8860b; }
        .sync-indicator { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
        .sync-status.online .sync-indicator { animation: none; }
        .sync-status.syncing .sync-indicator { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .filter-area { display: flex; flex-wrap: wrap; gap: 20px 30px; background: #f8faff; padding: 18px 22px; border-radius: 14px; margin: 20px 0 25px 0; align-items: flex-end; border: 1px solid #e3ebf6; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; flex: 1 0 160px; }
        .filter-group label { font-weight: 600; font-size: 13px; color: #1f3a5f; letter-spacing: 0.3px; }
        .filter-group select, .filter-group input { padding: 8px 12px; border-radius: 30px; border: 1px solid #cbdae9; background: white; font-size: 14px; width: 100%; }
        .filter-group input { background: #fafcff; }
        .filter-group select:focus, .filter-group input:focus { outline: 2px solid #2a7de1; border-color: transparent; }
        .filter-actions { display: flex; gap: 10px; align-items: center; margin-left: auto; flex-wrap: wrap; }
        .filter-actions button { background: #e2eaf5; border: none; padding: 8px 20px; border-radius: 30px; font-weight: 600; color: #1f3a5f; cursor: pointer; transition: 0.15s; white-space: nowrap; }
        .filter-actions button:hover { background: #c7d8ec; }
        .filter-actions button.primary { background: #2a7de1; color: white; }
        .filter-actions button.primary:hover { background: #1a5fb0; }
        .table-wrap { overflow-x: auto; border-radius: 14px; border: 1px solid #dfe8f2; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        thead { background: #1f3a5f; color: white; }
        th { padding: 12px 12px; text-align: left; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid #e5edf6; vertical-align: middle; }
        tr:hover { background: #f5f9ff; }
        tr.synced { background: #e6f7ed !important; }
        tr.sync-pending { background: #fff8e6 !important; }
        .col-no { width: 50px; text-align: center; }
        .col-nim { width: 150px; }
        .col-nama { min-width: 180px; }
        .col-kelas { width: 120px; }
        .col-gender { width: 60px; text-align: center; }
        .col-hadir { width: 130px; }
        .col-catatan { min-width: 160px; }
        select.status { padding: 5px 8px; border-radius: 20px; border: 1px solid #bccde0; background: white; font-size: 13px; width: 100%; }
        input.catatan { width: 100%; padding: 5px 8px; border: 1px solid #bccde0; border-radius: 20px; font-size: 13px; background: #fafcff; }
        input.catatan:focus, select.status:focus { outline: 2px solid #2a7de1; border-color: transparent; }
        .footer-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; flex-wrap: wrap; gap: 15px; }
        .info-badge { background: #eef3fa; padding: 8px 18px; border-radius: 30px; font-size: 14px; color: #1f3a5f; }
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-group button { padding: 10px 28px; border: none; border-radius: 30px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.15s; }
        .btn-export { background: #1f8b4c; color: white; }
        .btn-export:hover { background: #15703d; }
        .btn-sync { background: #2a7de1; color: white; }
        .btn-sync:hover { background: #1a5fb0; }
        .btn-sync:disabled { background: #a0c4e8; cursor: not-allowed; }
        .btn-mark-all { background: #e2eaf5; color: #1f3a5f; }
        .btn-mark-all:hover { background: #c7d8ec; }
        .btn-reset { background: #f0e6e6; color: #8f4a4a; }
        .btn-reset:hover { background: #e5d4d4; }
        .message { margin-top: 15px; padding: 12px 18px; border-radius: 12px; background: #dff0fa; color: #1a3a5f; display: none; }
        .message.show { display: block; }
        .empty-state { text-align: center; padding: 50px 20px; color: #6a7f9b; }
        .empty-state span { font-size: 48px; display: block; margin-bottom: 10px; }
        .auto-sync-toggle { display: flex; align-items: center; gap: 10px; background: #f8faff; padding: 10px 18px; border-radius: 30px; border: 1px solid #e3ebf6; font-size: 13px; color: #1f3a5f; font-weight: 600; }

        @media (max-width: 700px) {
            .container { padding: 15px; }
            .filter-area { flex-direction: column; align-items: stretch; }
            .filter-actions { margin-left: 0; }
            .footer-bar { flex-direction: column; align-items: stretch; }
            .btn-group { justify-content: center; }
        }
    </style>
</head>

<div class="container">

    </div>

        <div class="filter-group">

        <div class="filter-group">
            <label for="pengawasInput">Nama Pengawas</label>

        </div>
        <div class="filter-actions">
            <button id="btnTampilkan" class="primary">Tampilkan</button>
        </div>
    </div>
    <div class="table-wrap" id="tableWrap">
        <div class="empty-state"><span>📄</span><p>Pilih Program Studi dan Semester, lalu klik Tampilkan.</p></div>
    </div>
    <div class="footer-bar" id="footerBar" style="display: none;">

            <div class="auto-sync-toggle">

            </div>
        </div>
        <div class="btn-group">

            <button class="btn-export" id="btnExport">⬇️ Ekspor Excel</button>
        </div>
    </div>
    <div class="message" id="message"></div>
</div>

    // ==================== DOM & STATE ====================
    const prodiSelect = document.getElementById('prodiSelect');
    const semesterSelect = document.getElementById('semesterSelect');
    const mkInput = document.getElementById('mkInput');
    const ruangInput = document.getElementById('ruangInput');
    const pengawasInput = document.getElementById('pengawasInput');
    const btnTampilkan = document.getElementById('btnTampilkan');
    const tableWrap = document.getElementById('tableWrap');
    const footerBar = document.getElementById('footerBar');
    const infoBadge = document.getElementById('infoBadge');
    const messageDiv = document.getElementById('message');
    const btnMarkAllHadir = document.getElementById('btnMarkAllHadir');
    const btnMarkAllTidak = document.getElementById('btnMarkAllTidak');
    const btnResetStatus = document.getElementById('btnResetStatus');
    const btnExport = document.getElementById('btnExport');
    const btnSyncNow = document.getElementById('btnSyncNow');
    const autoSyncToggle = document.getElementById('autoSyncToggle');
    const syncStatus = document.getElementById('syncStatus');
    const syncStatusText = document.getElementById('syncStatusText');

    let currentDisplayData = [];
    let autoSyncInterval = null;
    let syncTimeout = null;

    // ==================== SYNC FUNCTIONS ====================
    function updateSyncStatus(status, text) {
        syncStatus.className = 'sync-status ' + status;
        syncStatusText.textContent = text;
    }

    async function syncToSpreadsheet(data) {
        if (!GAS_WEB_APP_URL) {
            updateSyncStatus('offline', 'URL Apps Script belum dikonfigurasi');
            return false;
        }

        updateSyncStatus('syncing', 'Sedang sinkronisasi...');
        btnSyncNow.disabled = true;

        const payload = {
            action: 'syncAttendance',
            prodi: prodiSelect.value,
            semester: semesterSelect.value,
            mataKuliah: mkInput.value.trim() || '-',
            ruang: ruangInput.value.trim() || '-',
            pengawas: pengawasInput.value.trim() || '-',
            timestamp: new Date().toISOString(),
            data: data.map(row => ({
                nim: row.nim,
                nama: row.nama,
                gender: row.gender,
                kelas: row.kelas,
                kehadiran: row._kehadiran || '',
                catatan: row._catatan || ''
            }))
        };

        try {
            await fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            updateSyncStatus('online', '✅ Tersinkron dengan Spreadsheet');
            showMessage('✅ Data berhasil disinkronkan ke Google Spreadsheet!');

            document.querySelectorAll('tbody tr').forEach(tr => {
                tr.classList.add('synced');
                tr.classList.remove('sync-pending');
            });
            return true;
        } catch (error) {
            console.error('Sync error:', error);
            updateSyncStatus('offline', '❌ Gagal sync: Periksa koneksi');
            showMessage('❌ Gagal sinkronisasi. Data tetap tersimpan lokal.', true);
            return false;
        } finally {
            btnSyncNow.disabled = false;
        }
    }

    function queueSync() {
        if (!autoSyncToggle.checked) return;
        document.querySelectorAll('tbody tr').forEach(tr => {
            if (!tr.classList.contains('synced')) tr.classList.add('sync-pending');
        });
        clearTimeout(syncTimeout);
        syncTimeout = setTimeout(() => {
            if (currentDisplayData.length > 0) syncToSpreadsheet(currentDisplayData);
        }, 2000);
    }

    function startAutoSync() {
        if (autoSyncInterval) clearInterval(autoSyncInterval);
        autoSyncInterval = setInterval(() => {
            if (autoSyncToggle.checked && currentDisplayData.length > 0) {
                const hasChanges = currentDisplayData.some(row => row._kehadiran || row._catatan);
                if (hasChanges) syncToSpreadsheet(currentDisplayData);
            }
        }, 30000);
    }

    function stopAutoSync() {
        if (autoSyncInterval) { clearInterval(autoSyncInterval); autoSyncInterval = null; }
    }

    // ==================== UI FUNCTIONS ====================
    function showMessage(text, isError) {
        messageDiv.textContent = text;
        messageDiv.style.background = isError ? '#fde8e8' : '#dff0fa';
        messageDiv.style.color = isError ? '#7a2e2e' : '#1a3a5f';
        messageDiv.classList.add('show');
        setTimeout(() => messageDiv.classList.remove('show'), 5000);
    }

    function clearMessage() { messageDiv.classList.remove('show'); }

    function renderTable(data) {
        if (!data || data.length === 0) {
            tableWrap.innerHTML = '<div class="empty-state"><span>📭</span><p>Tidak ada mahasiswa untuk filter ini.</p></div>';
            footerBar.style.display = 'none';
            return;
        }

        let html = '<table><thead><tr><th class="col-no">No</th><th class="col-nim">NIM</th><th class="col-nama">Nama</th><th class="col-gender">L/P</th><th class="col-kelas">Kelas</th><th class="col-hadir">Kehadiran</th><th class="col-catatan">Catatan</th></tr></thead><tbody>';

        data.forEach((row, idx) => {
            const hadirVal = row._kehadiran || '';
            const catatanVal = row._catatan || '';
            html += '<tr><td class="col-no">' + (idx + 1) + '</td><td class="col-nim"><strong>' + row.nim + '</strong></td><td class="col-nama">' + row.nama + '</td><td class="col-gender">' + row.gender + '</td><td class="col-kelas">' + row.kelas + '</td><td class="col-hadir"><select class="status" data-index="' + idx + '" data-field="kehadiran"><option value="">-- Pilih --</option><option value="Hadir"' + (hadirVal === 'Hadir' ? ' selected' : '') + '>Hadir</option><option value="Tidak Hadir"' + (hadirVal === 'Tidak Hadir' ? ' selected' : '') + '>Tidak Hadir</option><option value="Izin"' + (hadirVal === 'Izin' ? ' selected' : '') + '>Izin</option><option value="Sakit"' + (hadirVal === 'Sakit' ? ' selected' : '') + '>Sakit</option></select></td><td class="col-catatan"><input class="catatan" type="text" placeholder="Catatan (opsional)" data-index="' + idx + '" data-field="catatan" value="' + catatanVal + '"></td></tr>';
        });

        html += '</tbody></table>';
        tableWrap.innerHTML = html;
        footerBar.style.display = 'flex';
        infoBadge.textContent = 'Total: ' + data.length + ' mahasiswa';

        document.querySelectorAll('.status').forEach(sel => {
            sel.addEventListener('change', function() {
                const idx = parseInt(this.dataset.index);
                if (!isNaN(idx) && currentDisplayData[idx]) {
                    currentDisplayData[idx]._kehadiran = this.value;
                    queueSync();
                }
            });
        });

        document.querySelectorAll('.catatan').forEach(inp => {
            inp.addEventListener('input', function() {
                const idx = parseInt(this.dataset.index);
                if (!isNaN(idx) && currentDisplayData[idx]) {
                    currentDisplayData[idx]._catatan = this.value;
                    queueSync();
                }
            });
        });
    }

    function tampilkanData() {
        clearMessage();
        const prodi = prodiSelect.value;
        const semester = parseInt(semesterSelect.value);

        if (!prodi || !semester) {
            showMessage('Harap pilih Program Studi dan Semester.', true);
            tableWrap.innerHTML = '<div class="empty-state"><span>⚠️</span><p>Pilih Program Studi dan Semester, lalu klik Tampilkan.</p></div>';
            footerBar.style.display = 'none';
            currentDisplayData = [];
            return;
        }

        const filtered = allMahasiswa.filter(m => m.prodi === prodi && m.semester === semester);
        if (filtered.length === 0) {
            showMessage('Tidak ada data untuk kombinasi ini.', true);
            tableWrap.innerHTML = '<div class="empty-state"><span>📭</span><p>Data tidak ditemukan.</p></div>';
            footerBar.style.display = 'none';
            currentDisplayData = [];
            return;
        }

        currentDisplayData = filtered.map(m => ({ ...m, _kehadiran: '', _catatan: '' }));
        renderTable(currentDisplayData);
        showMessage('Menampilkan ' + currentDisplayData.length + ' mahasiswa untuk ' + prodi + ' - Semester ' + semester);
        startAutoSync();
    }

    btnTampilkan.addEventListener('click', tampilkanData);

    function markAll(status) {
        if (!currentDisplayData || currentDisplayData.length === 0) {
            showMessage('Tidak ada data yang ditampilkan.', true);
            return;
        }
        currentDisplayData.forEach(row => row._kehadiran = status);
        renderTable(currentDisplayData);
        showMessage('✅ Semua mahasiswa ditandai "' + status + '"');
        queueSync();
    }

    btnMarkAllHadir.addEventListener('click', () => markAll('Hadir'));
    btnMarkAllTidak.addEventListener('click', () => markAll('Tidak Hadir'));

    btnResetStatus.addEventListener('click', function() {
        if (!currentDisplayData || currentDisplayData.length === 0) {
            showMessage('Tidak ada data.', true);
            return;
        }
        currentDisplayData.forEach(row => { row._kehadiran = ''; row._catatan = ''; });
        renderTable(currentDisplayData);
        showMessage('↺ Status dan catatan direset');
        queueSync();
    });

    btnSyncNow.addEventListener('click', function() {
        if (!currentDisplayData || currentDisplayData.length === 0) {
            showMessage('Tidak ada data untuk disinkronkan.', true);
            return;
        }
        syncToSpreadsheet(currentDisplayData);
    });

    autoSyncToggle.addEventListener('change', function() {
        if (this.checked) { startAutoSync(); showMessage('✅ Auto-Sync diaktifkan'); }
        else { stopAutoSync(); showMessage('⏸️ Auto-Sync dinonaktifkan'); }
    });

    btnExport.addEventListener('click', function() {
        if (!currentDisplayData || currentDisplayData.length === 0) {
            showMessage('Tidak ada data untuk diekspor.', true);
            return;
        }

        const ruang = ruangInput.value.trim() || '-';
        const pengawas = pengawasInput.value.trim() || '-';
        const mataKuliah = mkInput.value.trim() || '-';

        const rows = [
            ['Mata Kuliah: ' + mataKuliah],
            ['Ruang Ujian: ' + ruang],
            ['Pengawas: ' + pengawas],
            [],
            ['No', 'NIM', 'Nama', 'L/P', 'Kelas', 'Kehadiran', 'Catatan']
        ];

        currentDisplayData.forEach((row, idx) => {
            rows.push([(idx + 1).toString(), row.nim, row.nama, row.gender, row.kelas, row._kehadiran || '', row._catatan || '']);
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, 'Daftar Hadir');
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/octet-stream' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Daftar_Hadir_UAS_' + prodiSelect.value + '_Sem' + semesterSelect.value + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
        link.click();
        URL.revokeObjectURL(link.href);
        showMessage('✅ File berhasil diekspor!');
    });

    console.log('Aplikasi Daftar Hadir UAS dengan Sync Spreadsheet siap.');
</script>
</body>
</html>
